  <!-- Central maple leaf -->
  <path fill="#C8102E" d="M32 15l-2.4 6.6-5-1.9 1.5 5.1-5 1.9 4.6 2.9-1.4 4.2 5.4-1.1L32 47l2.3-13.3 5.4 1.1-1.4-4.2 4.6-2.9-5-1.9 1.5-5.1-5 1.9z"/>
