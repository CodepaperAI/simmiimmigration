<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Simmi Immigration">
  <defs>
    <linearGradient id="simmiRing" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#7E0A1D"/>
      <stop offset="0.5" stop-color="#C8102E"/>
      <stop offset="1" stop-color="#E23A4C"/>
    </linearGradient>
  </defs>
  <!-- Orbit ring with a takeoff gap at the top-right (the journey) -->
